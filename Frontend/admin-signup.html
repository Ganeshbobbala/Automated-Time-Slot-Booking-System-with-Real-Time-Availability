<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Signup - Digital Ration</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo" data-i18n="appName">Automated Time Slot Booking System with Real-Time Availability</div>
    <div class="language-switcher">
      <select id="language-select" title="Select language" onchange="setLanguage(this.value)">
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="te">తెలుగు</option>
      </select>
    </div>
  </header>

  <div class="container">
    <div class="card" style="max-width: 420px; margin: 50px auto;">
      <h2>Admin Signup</h2>
      <form id="admin-signup-form">
        <div class="form-group">
          <label for="admin-signup-email" data-i18n="adminGmailId">Admin Gmail ID</label>
          <input type="text" id="admin-signup-email" placeholder="Enter admin Gmail ID" data-i18n="enterAdminGmail" required>
        </div>
        <div class="form-group">
          <label for="admin-signup-password" data-i18n="passwordLabel">Password</label>
          <input type="password" id="admin-signup-password" placeholder="Create password" data-i18n="enterPassword" required>
        </div>
        <div class="form-group">
          <label for="admin-signup-confirm">Confirm Password</label>
          <input type="password" id="admin-signup-confirm" placeholder="Confirm password" required>
        </div>
        <button type="submit" class="btn" data-i18n="signUp">Sign up</button>
      </form>
      <p style="margin-top: 10px; font-size: 0.9rem; text-align: center;">
        Already have an account?
        <a href="admin-login.html" style="color: #3498db; text-decoration: underline;">Login</a>
      </p>
      <p style="margin-top: 10px; font-size: 0.9rem; text-align: center;">
        <a href="index.html" style="color: #3498db;">← Back to Home</a>
      </p>
    </div>
  </div>

  <script src="translations.js"></script>
  <script src="main.js"></script>
</body>
</html>
