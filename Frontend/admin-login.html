<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Digital Ration</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <div class="logo" data-i18n="appName">Automated Time Slot Booking System with Real-Time Availability</div>
    <div class="language-switcher">
      <label for="language-select" data-i18n="languageLabel">Language:</label>
      <select id="language-select" onchange="setLanguage(this.value)">
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="te">తెలుగు</option>
      </select>
    </div>
  </header>

  <div class="container">
    <div class="card" style="max-width: 420px; margin: 50px auto;">
      <h2 data-i18n="adminLoginTitle">Admin Login</h2>
      <form id="admin-login-form">
        <div class="form-group">
          <label for="admin-email" data-i18n="adminGmailId">Admin Gmail ID</label>
          <input type="text" id="admin-email" placeholder="Enter admin Gmail ID" data-i18n="enterAdminGmail" required>
        </div>
        <div class="form-group">
          <label for="admin-password" data-i18n="passwordLabel">Password</label>
          <input type="password" id="admin-password" placeholder="Enter password" data-i18n="enterPassword" required>
        </div>
        <button type="submit" class="btn" data-i18n="login">Login</button>
      </form>
      <p style="margin-top: 10px; font-size: 0.9rem; text-align: center;">
        <span data-i18n="dontHaveAccount">Don't have an account?</span>
        <a href="admin-signup.html" style="color: #3498db; text-decoration: underline;" data-i18n="signUp">Sign up</a>
      </p>
      <p style="margin-top: 10px; font-size: 0.9rem; text-align: center;">
        <a href="index.html" style="color: #3498db;" data-i18n="backToHome">← Back to Home</a>
      </p>
      <p style="margin-top: 10px; font-size: 0.8rem; color: #7f8c8d;">
        <span data-i18n="demoBackup">Demo backup: if no signup exists, you can still use</span><br>
        <span data-i18n="usernameAdmin">Username: admin</span>, <span data-i18n="passwordAdmin">Password: admin</span>
      </p>
    </div>
  </div>

  <script src="translations.js"></script>
  <script src="main.js"></script>
</body>

</html>
