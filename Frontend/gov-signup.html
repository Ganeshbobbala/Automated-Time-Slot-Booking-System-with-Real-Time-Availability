<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Government Secure Signup</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 3rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }
    h2 {
      color: #0f172a;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }
    p.subtitle {
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .form-group {
      text-align: left;
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #334155;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .btn-login {
      background: #3b82f6;
      color: white;
      border: none;
      width: 100%;
      padding: 1rem;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }
    .btn-login:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #64748b;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .back-link:hover {
      color: #0f172a;
    }
    #error-msg {
      color: #ef4444;
      background: #fee2e2;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      display: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-icon">🏛️</div>
    <h2>Government Registration</h2>
    <p class="subtitle">Register your official account</p>

    <div id="error-msg">Email is already registered!</div>

    <form id="gov-signup-form">
      <div class="form-group">
        <label for="gov-name">Full Name / Department</label>
        <input type="text" id="gov-name" placeholder="e.g. Civil Supplies Head" required>
      </div>
      <div class="form-group">
        <label for="gov-email">Official Email</label>
        <input type="email" id="gov-email" placeholder="official@gov.in" required>
      </div>
      <div class="form-group">
        <label for="gov-password">Secure Password</label>
        <input type="password" id="gov-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Register Account 📝</button>
    </form>
    
    <div style="margin-top: 20px; font-size: 0.9rem; color: #64748b;">
      Already registered? <a href="gov-login.html" style="color: #3b82f6; text-decoration: none; font-weight: bold;">Login here</a>
    </div>
    
    <a href="index.html" class="back-link">← Return to Main Page</a>
  </div>

  <script>
    document.getElementById('gov-signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('gov-name').value;
      const email = document.getElementById('gov-email').value;
      const pass = document.getElementById('gov-password').value;
      const errorMsg = document.getElementById('error-msg');
      
      let govUsers = JSON.parse(localStorage.getItem('govUsers') || '[]');
      
      // Check if email already exists
      const existingUser = govUsers.find(u => u.email === email);
      if (existingUser) {
        errorMsg.style.display = 'block';
        return;
      }
      
      // Create new user
      govUsers.push({
        name: name,
        email: email,
        password: pass
      });
      localStorage.setItem('govUsers', JSON.stringify(govUsers));
      
      alert("Registration successful! Please login with your credentials.");
      window.location.href = 'gov-login.html';
    });
  </script>
</body>
</html>
